<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steel and Sigils - DEV MODE</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f0f;
            display: flex;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a1a;
        }
        #dev-panel {
            width: 350px;
            background: #1a1a2e;
            border-left: 3px solid #e94560;
            padding: 20px;
            color: #eaeaea;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }
        .panel-title {
            font-size: 20px;
            color: #e94560;
            border-bottom: 2px solid #e94560;
            padding-bottom: 10px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .dev-badge {
            background: #e94560;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }
        .section {
            background: #16213e;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #0f3460;
        }
        .section-title {
            font-size: 14px;
            color: #a68966;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        .btn {
            background: #0f3460;
            border: 1px solid #5d4e3e;
            color: #e3d5b8;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .btn:hover {
            background: #5d4e3e;
            border-color: #a68966;
        }
        .btn-spawn {
            background: #2d5a27;
            border-color: #4a8b3c;
        }
        .btn-spawn:hover {
            background: #4a8b3c;
        }
        .btn-perk {
            background: #8b6914;
            border-color: #d4a574;
        }
        .btn-perk:hover {
            background: #d4a574;
            color: #1a1a2e;
        }
        .console-log {
            background: #0f0f0f;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            height: 200px;
            overflow-y: auto;
            color: #4ecdc4;
        }
        .log-entry { margin: 3px 0; }
        .log-error { color: #e94560; }
        .log-success { color: #4ecdc4; }
        .log-info { color: #ffd93d; }
        input[type="number"] {
            width: 60px;
            background: #0f0f0f;
            border: 1px solid #5d4e3e;
            color: #e3d5b8;
            padding: 5px;
            border-radius: 4px;
        }
        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 8px;
        }
        select {
            background: #0f0f0f;
            border: 1px solid #5d4e3e;
            color: #e3d5b8;
            padding: 5px;
            border-radius: 4px;
            flex: 1;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    
    <div id="dev-panel">
        <div class="panel-title">
            <span class="dev-badge">DEV</span>
            Steel and Sigils
        </div>
        
        <div class="section">
            <div class="section-title">Quick Actions</div>
            <div class="btn-grid">
                <button class="btn" onclick="dev.reset()">Reset Grid</button>
                <button class="btn" onclick="dev.clearEnemies()">Clear Enemies</button>
                <button class="btn" onclick="dev.endRound()">End Round</button>
                <button class="btn" onclick="dev.fullMana()">Max Mana</button>
            </div>
        </div>
        
        <div class="section">
            <div class="section-title">Spawn Unit</div>
            <div class="input-row">
                <select id="spawn-unit-type">
                    <optgroup label="Player Units">
                        <option value="KNIGHT">Knight</option>
                        <option value="ARCHER">Archer</option>
                        <option value="WIZARD">Wizard</option>
                        <option value="BERSERKER">Berserker</option>
                        <option value="PALADIN">Paladin</option>
                        <option value="RANGER">Ranger</option>
                        <option value="ROGUE">Rogue</option>
                        <option value="CLERIC">Cleric</option>
                        <option value="SORCERER">Sorcerer</option>
                    </optgroup>
                    <optgroup label="Enemies">
                        <option value="ORC_WARRIOR">Orc Warrior</option>
                        <option value="SKELETON_SOLDIER">Skeleton</option>
                        <option value="CULTIST_ACOLYTE">Cultist</option>
                        <option value="WAR_CHIEFTAIN_GORMAK">Boss: Gormak</option>
                    </optgroup>
                </select>
            </div>
            <div class="input-row">
                X: <input type="number" id="spawn-x" value="5" min="0" max="14">
                Y: <input type="number" id="spawn-y" value="5" min="0" max="14">
            </div>
            <div class="btn-grid">
                <button class="btn btn-spawn" onclick="dev.spawnPlayer()">Spawn Player</button>
                <button class="btn btn-spawn" onclick="dev.spawnEnemy()">Spawn Enemy</button>
            </div>
        </div>
        
        <div class="section">
            <div class="section-title">Add Perks/Buffs</div>
            <div class="btn-grid">
                <button class="btn btn-perk" onclick="dev.addBuff('doubleStrike')">Double Strike</button>
                <button class="btn btn-perk" onclick="dev.addBuff('cleave')">Divine Wrath</button>
                <button class="btn btn-perk" onclick="dev.addBuff('ricochet')">Ricochet</button>
                <button class="btn btn-perk" onclick="dev.addBuff('piercing')">Arcane Pierce</button>
                <button class="btn btn-perk" onclick="dev.addBuff('backstab')">Shadow Strike</button>
                <button class="btn btn-perk" onclick="dev.addBuff('divineRetribution')">Divine Retribution</button>
                <button class="btn btn-perk" onclick="dev.addBuff('arcaneFocus')">Arcane Focus</button>
                <button class="btn" onclick="dev.addRewardOptions()">Add Rewards</button>
            </div>
        </div>
        
        <div class="section">
            <div class="section-title">Map Selection</div>
            <div class="btn-grid">
                <button class="btn" onclick="dev.loadMap('whispering_woods')">🌲 Whispering Woods</button>
                <button class="btn" onclick="dev.loadMap('ruins_castle')">🏰 Ruins of a Castle</button>
                <button class="btn" onclick="dev.loadMap('mountain_pass')">⛰️ Mountain Pass</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Test Scenarios</div>
            <div class="btn-grid">
                <button class="btn" onclick="dev.testScenario('legendary_ranger')">Legendary Ranger</button>
                <button class="btn" onclick="dev.testScenario('mythic_paladin')">Mythic Paladin</button>
                <button class="btn" onclick="dev.testScenario('full_army')">Full Army</button>
                <button class="btn" onclick="dev.testScenario('boss_fight')">Boss Fight</button>
            </div>
        </div>
        
        <div class="section">
            <div class="section-title">Console Output</div>
            <div class="console-log" id="console-output">
                <div class="log-entry log-info">Dev mode initialized. Use console commands or buttons above.</div>
            </div>
        </div>
    </div>

    <script>
        // Unit definitions with emojis and colors
        const UNIT_DEFINITIONS = {
            // Player Units
            KNIGHT: { name: 'Knight', emoji: '⚔️', color: 0x4a90e2 },
            ARCHER: { name: 'Archer', emoji: '🏹', color: 0x4a90e2 },
            WIZARD: { name: 'Wizard', emoji: '🧙', color: 0x4a90e2 },
            BERSERKER: { name: 'Berserker', emoji: '🪓', color: 0x4a90e2 },
            PALADIN: { name: 'Paladin', emoji: '🛡️', color: 0x4a90e2 },
            RANGER: { name: 'Ranger', emoji: '🎯', color: 0x4a90e2 },
            ROGUE: { name: 'Rogue', emoji: '🗡️', color: 0x4a90e2 },
            CLERIC: { name: 'Cleric', emoji: '✨', color: 0x4a90e2 },
            SORCERER: { name: 'Sorcerer', emoji: '🔮', color: 0x4a90e2 },
            // Enemies
            ORC_WARRIOR: { name: 'Orc Warrior', emoji: '👹', color: 0xe74c3c },
            SKELETON_SOLDIER: { name: 'Skeleton', emoji: '💀', color: 0xe74c3c },
            CULTIST_ACOLYTE: { name: 'Cultist', emoji: '🧛', color: 0xe74c3c },
            WAR_CHIEFTAIN_GORMAK: { name: 'Gormak', emoji: '👿', color: 0xc0392b, isBoss: true }
        };

        // Map configurations
        const MAP_CONFIGS = {
            whispering_woods: {
                name: 'Whispering Woods',
                gridSize: 15,
                terrain: 'forest',
                baseColor1: 0x2d5a27,  // Dark green
                baseColor2: 0x3d7a37,  // Light green
                obstacles: []  // No obstacles for open forest
            },
            ruins_castle: {
                name: 'Ruins of a Castle',
                gridSize: 17,
                terrain: 'castle',
                baseColor1: 0x3d3d3d,  // Gray stone
                baseColor2: 0x4a4a4a,  // Lighter stone
                wallColor: 0x5a5a5a,
                // Player spawn area is 5x5 at center
                // Walls spawn ONE CELL LAYER around spawn (border ring)
                obstacles: []  // Will be generated dynamically
            },
            mountain_pass: {
                name: 'Mountain Pass',
                gridSize: 19,
                terrain: 'mountain',
                baseColor1: 0x5d4037,  // Brown earth
                baseColor2: 0x6d5047,  // Lighter earth
                rockColor: 0x757575,
                // Rocks spawn but must not trap units
                // 2x2 bosses need clear paths
                obstacles: []  // Will be generated dynamically
            }
        };

        // Current map state
        window.currentMap = {
            config: null,
            obstacles: []  // Array of {x, y, type} for walls/rocks
        };

        // Dev mode game state
        window.devMode = {
            scene: null,
            selectedUnit: null,
            gridSize: 15,
            tileSize: 40,
            log: [],
            units: []
        };
        
        // Console output helper
        function log(message, type = 'info') {
            const output = document.getElementById('console-output');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            output.appendChild(entry);
            output.scrollTop = output.scrollHeight;
            window.devMode.log.push({ time: Date.now(), message, type });
            console.log(`[DEV] ${message}`);
            return { success: true, message };
        }
        
        // Dev API exposed to console
        window.dev = {
            spawn: (unitType, x, y, team) => {
                try {
                    const scene = window.devMode.scene;
                    if (!scene) {
                        log('Error: Scene not initialized', 'error');
                        return { success: false, error: 'Scene not initialized' };
                    }

                    // Check bounds
                    if (x < 0 || x >= window.devMode.gridSize || y < 0 || y >= window.devMode.gridSize) {
                        log(`Error: Position (${x},${y}) is out of bounds`, 'error');
                        return { success: false, error: 'Position out of bounds' };
                    }

                    // Check if position is an obstacle
                    const obstacle = window.currentMap.obstacles.find(o => o.x === x && o.y === y);
                    if (obstacle) {
                        log(`Error: Position (${x},${y}) is blocked by ${obstacle.type}`, 'error');
                        return { success: false, error: 'Position blocked by obstacle' };
                    }

                    // Check if position is occupied
                    const existingUnit = window.devMode.units.find(u => u.x === x && u.y === y);
                    if (existingUnit) {
                        log(`Error: Position (${x},${y}) is already occupied by ${existingUnit.type}`, 'error');
                        return { success: false, error: 'Position occupied' };
                    }

                    const unitDef = UNIT_DEFINITIONS[unitType];
                    if (!unitDef) {
                        log(`Error: Unknown unit type ${unitType}`, 'error');
                        return { success: false, error: 'Unknown unit type' };
                    }

                    // Create the unit object
                    const unit = {
                        type: unitType,
                        x: x,
                        y: y,
                        team: team,
                        name: unitDef.name,
                        emoji: unitDef.emoji,
                        isBoss: unitDef.isBoss || false,
                        maxHealth: unitDef.isBoss ? 300 : 100,
                        health: unitDef.isBoss ? 300 : 100,
                        buffs: []
                    };

                    // Create sprite and health bar
                    const result = scene.createUnitSprite(unit);
                    if (!result) {
                        log(`Error: Failed to create sprite for ${unitType}`, 'error');
                        return { success: false, error: 'Failed to create sprite' };
                    }

                    window.devMode.units.push(unit);
                    log(`Spawned ${unitDef.name} at (${x},${y}) for ${team}`, 'success');
                    return { success: true, unitType, x, y, team };
                } catch (e) {
                    log(`Error: ${e.message}`, 'error');
                    return { success: false, error: e.message };
                }
            },
            
            spawnPlayer: () => {
                const type = document.getElementById('spawn-unit-type').value;
                const x = parseInt(document.getElementById('spawn-x').value);
                const y = parseInt(document.getElementById('spawn-y').value);
                return dev.spawn(type, x, y, 'player');
            },
            
            spawnEnemy: () => {
                const type = document.getElementById('spawn-unit-type').value;
                const x = parseInt(document.getElementById('spawn-x').value);
                const y = parseInt(document.getElementById('spawn-y').value);
                return dev.spawn(type, x, y, 'enemy');
            },
            
            select: (x, y) => {
                const unit = window.devMode.units.find(u => u.x === x && u.y === y);
                if (unit) {
                    window.devMode.selectedUnit = unit;
                    log(`Selected ${unit.name} at (${x},${y})`);
                    return { success: true, unit };
                } else {
                    log(`No unit at (${x},${y})`, 'error');
                    return { success: false, error: 'No unit at position' };
                }
            },
            
            setStat: (stat, value) => {
                const unit = window.devMode.selectedUnit;
                if (!unit) {
                    log('No unit selected', 'error');
                    return { success: false, error: 'No unit selected' };
                }
                unit[stat] = value;
                log(`Set ${stat} to ${value} for ${unit.name}`);
                return { success: true, stat, value };
            },
            
            addBuff: (buffType) => {
                const unit = window.devMode.selectedUnit;
                if (!unit) {
                    log('No unit selected - click a unit first', 'error');
                    return { success: false, error: 'No unit selected' };
                }
                if (!unit.buffs.includes(buffType)) {
                    unit.buffs.push(buffType);
                    log(`Added ${buffType} to ${unit.name}`, 'success');
                } else {
                    log(`${unit.name} already has ${buffType}`);
                }
                return { success: true, buffType, unit: unit.name };
            },
            
            addRewardOptions: () => {
                log('Adding reward options');
                return { success: true };
            },
            
            endRound: () => {
                log('Ending round');
                return { success: true };
            },
            
            fullMana: () => {
                log('Setting mana to max');
                return { success: true };
            },
            
            reset: () => {
                const scene = window.devMode.scene;
                if (scene) {
                    // Destroy all unit sprites and health bars
                    window.devMode.units.forEach(unit => {
                        if (unit.sprite) unit.sprite.destroy();
                        if (unit.healthBar) unit.healthBar.destroy();
                        if (unit.healthBarBg) unit.healthBarBg.destroy();
                    });
                }
                window.devMode.units = [];
                window.devMode.selectedUnit = null;
                // Don't clear obstacles on reset - they persist per map
                log('Grid reset');
                return { success: true };
            },
            
            clearEnemies: () => {
                const scene = window.devMode.scene;
                if (scene) {
                    // Destroy enemy sprites
                    window.devMode.units.filter(u => u.team === 'enemy').forEach(unit => {
                        if (unit.sprite) unit.sprite.destroy();
                        if (unit.healthBar) unit.healthBar.destroy();
                        if (unit.healthBarBg) unit.healthBarBg.destroy();
                    });
                }
                window.devMode.units = window.devMode.units.filter(u => u.team === 'player');
                log('Enemies cleared');
                return { success: true };
            },
            
            testScenario: (scenario) => {
                log(`Loading test scenario: ${scenario}`);
                const scenarios = {
                    legendary_ranger: () => {
                        dev.reset();
                        dev.spawn('RANGER', 2, 7, 'player');
                        dev.spawn('ORC_WARRIOR', 8, 7, 'enemy');
                        log('Legendary Ranger scenario loaded. End round to trigger rewards.', 'success');
                    },
                    mythic_paladin: () => {
                        dev.reset();
                        dev.spawn('PALADIN', 2, 7, 'player');
                        dev.addBuff('cleave');
                        log('Mythic Paladin scenario loaded. End round to trigger mythic option.', 'success');
                    },
                    full_army: () => {
                        dev.reset();
                        ['KNIGHT', 'ARCHER', 'WIZARD', 'BERSERKER', 'PALADIN', 'RANGER', 'ROGUE', 'CLERIC', 'SORCERER'].forEach((type, i) => {
                            dev.spawn(type, 1 + i, 10, 'player');
                        });
                        log('Full army spawned', 'success');
                    },
                    boss_fight: () => {
                        dev.reset();
                        dev.spawn('PALADIN', 2, 7, 'player');
                        dev.spawn('WAR_CHIEFTAIN_GORMAK', 10, 7, 'enemy');
                        log('Boss fight scenario loaded', 'success');
                    }
                };
                
                if (scenarios[scenario]) {
                    scenarios[scenario]();
                    return { success: true, scenario };
                } else {
                    log(`Unknown scenario: ${scenario}`, 'error');
                    return { success: false, error: 'Unknown scenario' };
                }
            },
            
            snapshot: () => {
                log('Taking screenshot...');
                return new Promise((resolve) => {
                    setTimeout(() => {
                        log('Screenshot captured');
                        resolve({ timestamp: Date.now(), success: true });
                    }, 100);
                });
            },
            
            getLogs: () => window.devMode.log,
            
            clearLogs: () => {
                window.devMode.log = [];
                document.getElementById('console-output').innerHTML = '';
                log('Logs cleared');
                return { success: true };
            },

            loadMap: (mapId) => {
                try {
                    const config = MAP_CONFIGS[mapId];
                    if (!config) {
                        log(`Error: Unknown map ${mapId}`, 'error');
                        return { success: false, error: 'Unknown map' };
                    }

                    // Clear current units and obstacles
                    dev.reset();
                    
                    // Update grid size
                    window.devMode.gridSize = config.gridSize;
                    window.currentMap.config = config;
                    window.currentMap.obstacles = [];

                    // Generate obstacles based on map type
                    if (mapId === 'ruins_castle') {
                        generateCastleWalls(config);
                    } else if (mapId === 'mountain_pass') {
                        generateMountainRocks(config);
                    }

                    // Regenerate the grid
                    const scene = window.devMode.scene;
                    if (scene) {
                        scene.regenerateGrid();
                    }

                    log(`Loaded map: ${config.name} (${config.gridSize}x${config.gridSize}) with ${window.currentMap.obstacles.length} obstacles`, 'success');
                    return { success: true, map: config.name, obstacles: window.currentMap.obstacles.length };
                } catch (e) {
                    log(`Error loading map: ${e.message}`, 'error');
                    return { success: false, error: e.message };
                }
            }
        };

        // Generate castle walls - ONE CELL LAYER border around 5x5 center spawn WITH GAPS
        function generateCastleWalls(config) {
            const size = config.gridSize;
            const center = Math.floor(size / 2);
            const obstacles = [];
            
            // Player spawn area: 5x5 centered
            const spawnStart = center - 2;  // inclusive
            const spawnEnd = center + 2;    // inclusive
            
            // Wall layer is ONE CELL outside the spawn area
            const wallStart = spawnStart - 1;
            const wallEnd = spawnEnd + 1;
            
            // Create gaps in the wall border (1-2 cells) to allow passage
            // Gaps at top, bottom, left, right of the border
            const gapPositions = [
                { x: center, y: wallStart },      // Top gap
                { x: center, y: wallEnd },        // Bottom gap
                { x: wallStart, y: center },      // Left gap
                { x: wallEnd, y: center }         // Right gap
            ];
            const gapSet = new Set(gapPositions.map(g => `${g.x},${g.y}`));
            
            // Create wall border around spawn area (with gaps)
            for (let x = wallStart; x <= wallEnd; x++) {
                for (let y = wallStart; y <= wallEnd; y++) {
                    // Skip if inside spawn area (walls only on border)
                    if (x >= spawnStart && x <= spawnEnd && y >= spawnStart && y <= spawnEnd) {
                        continue;
                    }
                    
                    // Only place walls on the border ring (one cell layer)
                    if (x === wallStart || x === wallEnd || y === wallStart || y === wallEnd) {
                        // Skip if this position is a gap
                        if (gapSet.has(`${x},${y}`)) {
                            continue;
                        }
                        obstacles.push({ x, y, type: 'wall' });
                    }
                }
            }
            
            window.currentMap.obstacles = obstacles;
        }

        // Generate mountain rocks - ensure no 2x2 traps, bosses can move
        function generateMountainRocks(config) {
            const size = config.gridSize;
            const obstacles = [];
            const rockSet = new Set();
            
            // Helper to check if a position has a rock
            const hasRock = (x, y) => rockSet.has(`${x},${y}`);
            
            // Helper to check if placing a rock at (x,y) would create a 2x2 block
            const creates2x2Block = (x, y) => {
                // Check all four possible 2x2 squares that include (x,y)
                const checks = [
                    [[x-1, y-1], [x, y-1], [x-1, y], [x, y]],  // top-left
                    [[x, y-1], [x+1, y-1], [x, y], [x+1, y]],  // top-right
                    [[x-1, y], [x, y], [x-1, y+1], [x, y+1]],  // bottom-left
                    [[x, y], [x+1, y], [x, y+1], [x+1, y+1]]   // bottom-right
                ];
                
                for (const square of checks) {
                    let rockCount = 0;
                    let validCells = 0;
                    for (const [cx, cy] of square) {
                        if (cx >= 0 && cx < size && cy >= 0 && cy < size) {
                            validCells++;
                            if (hasRock(cx, cy) || (cx === x && cy === y)) {
                                rockCount++;
                            }
                        }
                    }
                    // If all 4 cells exist and would be blocked, that's a problem
                    if (validCells === 4 && rockCount === 4) {
                        return true;
                    }
                }
                return false;
            };
            
            // Helper to check if position is in center spawn area (keep clear)
            const center = Math.floor(size / 2);
            const isSpawnArea = (x, y) => {
                return x >= center - 2 && x <= center + 2 && y >= center - 2 && y <= center + 2;
            };
            
            // Generate rocks with constraints
            const rockDensity = 0.15;  // 15% coverage
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    // Skip spawn area
                    if (isSpawnArea(x, y)) continue;
                    
                    // Random placement with density
                    if (Math.random() < rockDensity) {
                        // Check if this would create a 2x2 block (traps 1x1 units)
                        if (!creates2x2Block(x, y)) {
                            rockSet.add(`${x},${y}`);
                            // Random rock variation
                            const rockTypes = ['rock', 'rock_tall', 'rock_wide', 'rock_jagged'];
                            const rockType = rockTypes[Math.floor(Math.random() * rockTypes.length)];
                            obstacles.push({ x, y, type: rockType });
                        }
                    }
                }
            }
            
            // Simple path check: ensure center is connected to edges
            // Just verify we haven't accidentally blocked everything
            const reachable = countReachable(size, obstacles, center, center);
            const totalCells = size * size - 25; // minus spawn area
            
            // If less than 50% of map is reachable, we have a problem
            if (reachable < totalCells * 0.5) {
                console.warn('[DEV] Map connectivity low, reducing rocks');
                // Remove some rocks to improve connectivity
                while (obstacles.length > totalCells * 0.1 && reachable < totalCells * 0.7) {
                    const idx = Math.floor(Math.random() * obstacles.length);
                    const removed = obstacles.splice(idx, 1)[0];
                    rockSet.delete(`${removed.x},${removed.y}`);
                }
            }
            
            window.currentMap.obstacles = obstacles;
        }

        // Count reachable cells from a starting position
        function countReachable(size, obstacles, startX, startY) {
            const obstacleSet = new Set(obstacles.map(o => `${o.x},${o.y}`));
            const visited = new Set();
            const queue = [[startX, startY]];
            visited.add(`${startX},${startY}`);
            
            const directions = [[0,1], [0,-1], [1,0], [-1,0]];
            
            while (queue.length > 0) {
                const [cx, cy] = queue.shift();
                
                for (const [dx, dy] of directions) {
                    const nx = cx + dx;
                    const ny = cy + dy;
                    
                    if (nx >= 0 && nx < size && ny >= 0 && ny < size) {
                        const key = `${nx},${ny}`;
                        if (!visited.has(key) && !obstacleSet.has(key)) {
                            visited.add(key);
                            queue.push([nx, ny]);
                        }
                    }
                }
            }
            
            return visited.size;
        }
        
        // Phaser scene
        class DevScene extends Phaser.Scene {
            constructor() {
                super({ key: 'DevScene' });
            }
            
            create() {
                window.devMode.scene = this;
                log('Dev scene initialized');
                
                this.gridContainer = this.add.container(0, 0);
                this.obstacleContainer = this.add.container(0, 0);
                
                this.regenerateGrid();
                
                // Load default scenario
                setTimeout(() => dev.testScenario('legendary_ranger'), 100);
            }

            regenerateGrid() {
                const tileSize = window.devMode.tileSize;
                const size = window.devMode.gridSize;
                const mapConfig = window.currentMap.config || { baseColor1: 0x2d3561, baseColor2: 0x252d52 };
                
                // Clear existing grid and obstacles
                this.gridContainer.removeAll(true);
                this.obstacleContainer.removeAll(true);
                
                // Create grid tiles
                for (let y = 0; y < size; y++) {
                    for (let x = 0; x < size; x++) {
                        let color = (x + y) % 2 === 0 ? mapConfig.baseColor1 : mapConfig.baseColor2;
                        
                        // Darken spawn area slightly for visibility
                        const center = Math.floor(size / 2);
                        if (x >= center - 2 && x <= center + 2 && y >= center - 2 && y <= center + 2) {
                            color = (x + y) % 2 === 0 ? 0x3d4a6f : 0x354263;
                        }
                        
                        const tile = this.add.rectangle(
                            x * tileSize + tileSize/2,
                            y * tileSize + tileSize/2,
                            tileSize - 1,
                            tileSize - 1,
                            color
                        );
                        this.gridContainer.add(tile);
                    }
                }
                
                // Draw obstacles
                const obstacles = window.currentMap.obstacles || [];
                obstacles.forEach(obs => {
                    const x = obs.x * tileSize + tileSize / 2;
                    const y = obs.y * tileSize + tileSize / 2;
                    
                    if (obs.type === 'wall') {
                        // Castle wall - gray block with random rotation
                        const wall = this.add.rectangle(x, y, tileSize - 2, tileSize - 2, 0x5a5a5a);
                        const wallDetail = this.add.rectangle(x, y, tileSize - 6, tileSize - 6, 0x6a6a6a);
                        
                        // Random 180° rotation for visual variety
                        if (Math.random() > 0.5) {
                            wall.setRotation(Math.PI);
                            wallDetail.setRotation(Math.PI);
                        }
                        
                        this.obstacleContainer.add([wall, wallDetail]);
                    } else if (obs.type && obs.type.startsWith('rock')) {
                        // Mountain rocks with varied shapes and colors
                        let mainColor, detailColor, scaleX = 1, scaleY = 1;
                        
                        switch (obs.type) {
                            case 'rock_tall':
                                mainColor = 0x6a6a6a;    // Slightly lighter
                                detailColor = 0x8a8a8a;
                                scaleY = 1.3;
                                scaleX = 0.85;
                                break;
                            case 'rock_wide':
                                mainColor = 0x707070;    // Medium gray
                                detailColor = 0x909090;
                                scaleX = 1.3;
                                scaleY = 0.85;
                                break;
                            case 'rock_jagged':
                                mainColor = 0x656565;    // Darker
                                detailColor = 0x858585;
                                break;
                            default: // 'rock'
                                mainColor = 0x757575;
                                detailColor = 0x858585;
                        }
                        
                        // Draw rock with variation
                        const rockRadius = (tileSize/2 - 2) * Math.min(scaleX, scaleY);
                        const rock = this.add.circle(x, y, rockRadius, mainColor);
                        const detailRadius = (tileSize/3) * Math.min(scaleX, scaleY);
                        const rockDetail = this.add.circle(x, y - rockRadius * 0.2, detailRadius, detailColor);
                        
                        // Apply scaling for tall/wide variations
                        rock.setScale(scaleX, scaleY);
                        rockDetail.setScale(scaleX, scaleY);
                        
                        // Random 180° rotation for visual variety
                        if (Math.random() > 0.5) {
                            rock.setRotation(Math.PI);
                            rockDetail.setRotation(Math.PI);
                        }
                        
                        this.obstacleContainer.add([rock, rockDetail]);
                    }
                });
                
                // Update spawn input max values
                document.getElementById('spawn-x').max = size - 1;
                document.getElementById('spawn-y').max = size - 1;
            }

            createUnitSprite(unit) {
                try {
                    const tileSize = window.devMode.tileSize;
                    const x = unit.x * tileSize + tileSize / 2;
                    const y = unit.y * tileSize + tileSize / 2;

                    // Create container for unit
                    const container = this.add.container(x, y);

                    // Create emoji sprite
                    const fontSize = unit.isBoss ? '40px' : '28px';
                    const sprite = this.add.text(0, 0, unit.emoji, {
                        fontSize: fontSize,
                        align: 'center'
                    }).setOrigin(0.5);

                    // Add team indicator (colored circle background)
                    const bgColor = unit.team === 'player' ? 0x4a90e2 : 0xe74c3c;
                    const bgRadius = unit.isBoss ? 24 : 18;
                    const bg = this.add.circle(0, 0, bgRadius, bgColor, 0.3);
                    
                    container.add([bg, sprite]);
                    container.setSize(tileSize, tileSize);
                    container.setInteractive();

                    // Health bar background
                    const barWidth = unit.isBoss ? 50 : 32;
                    const barHeight = 6;
                    const healthBarBg = this.add.rectangle(0, -tileSize/2 + 8, barWidth, barHeight, 0x333333);
                    
                    // Health bar
                    const healthBar = this.add.rectangle(0, -tileSize/2 + 8, barWidth, barHeight, 0x2ecc71);
                    
                    // Update health bar
                    const healthPercent = unit.health / unit.maxHealth;
                    healthBar.width = barWidth * healthPercent;
                    
                    // Color based on health
                    if (healthPercent < 0.3) {
                        healthBar.fillColor = 0xe74c3c; // Red
                    } else if (healthPercent < 0.6) {
                        healthBar.fillColor = 0xf39c12; // Orange
                    }

                    container.add([healthBarBg, healthBar]);

                    // Store references
                    unit.sprite = container;
                    unit.healthBar = healthBar;
                    unit.healthBarBg = healthBarBg;

                    // Click handler for selection
                    container.on('pointerdown', () => {
                        window.devMode.selectedUnit = unit;
                        log(`Selected ${unit.name} at (${unit.x},${unit.y})`);
                        
                        // Visual feedback - briefly scale up
                        this.tweens.add({
                            targets: container,
                            scale: 1.2,
                            duration: 100,
                            yoyo: true
                        });
                    });

                    // Hover effect
                    container.on('pointerover', () => {
                        container.setAlpha(0.8);
                        document.body.style.cursor = 'pointer';
                    });

                    container.on('pointerout', () => {
                        container.setAlpha(1);
                        document.body.style.cursor = 'default';
                    });

                    return true;
                } catch (e) {
                    console.error('Error creating unit sprite:', e);
                    return false;
                }
            }
        }
        
        const config = {
            type: Phaser.AUTO,
            width: 600,
            height: 600,
            parent: 'game-container',
            backgroundColor: '#1a1a1a',
            scene: DevScene
        };
        
        new Phaser.Game(config);
        log('Dev mode ready. Use dev.* commands in console or buttons above.');
    </script>
</body>
</html>
